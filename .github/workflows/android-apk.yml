name: Build Bilal Android APK

on:
  push:
    tags: ["v*"]          # tagging v1.0, v1.1 … publishes a downloadable APK
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Sync web assets into the native project
        run: npm run build:android

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Rename artifact
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Bilal-${{ github.ref_name }}.apk

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bilal-APK
          path: Bilal-*.apk

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Bilal-*.apk
